opt_in_rules:
  - force_unwrapping
  - implicit_return
  - empty_count
  - closure_spacing
  - contains_over_first_not_nil
  - first_where
  - last_where
  - explicit_init
  - redundant_nil_coalescing
  - sorted_first_last
  - implicitly_unwrapped_optional

# unused_import는 analyzer 전용 룰 (`swiftlint analyze`로만 실행)
analyzer_rules:
  - unused_import

force_cast: error
force_try: error
force_unwrapping: error
implicitly_unwrapped_optional:
  severity: warning

# trailing comma는 diff 친화적이라 의도적으로 사용. 일관 강제.
trailing_comma:
  mandatory_comma: true

line_length:
  warning: 140
  error: 200
  ignores_comments: true
  ignores_urls: true

file_length:
  warning: 500
  error: 800

function_body_length:
  warning: 60
  error: 120

type_body_length:
  warning: 300
  error: 500

cyclomatic_complexity:
  warning: 12
  error: 20

identifier_name:
  min_length: 2
  excluded:
    - id
    - x
    - y
    - to
    - by

excluded:
  - .build
  - .swiftpm
  - Modules/.build
  - DerivedData
  - "**/*.generated.swift"

reporter: "xcode"
